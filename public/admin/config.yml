backend:
  name: git-gateway
  branch: main
  load_netlify_identity: false

publish_mode: editorial_workflow

media_folder: "src/assets/uploads"
public_folder: "../../assets/uploads"

slug:
  encoding: "ascii"
  clean_accents: true
  sanitize_replacement: "-"

collections:
  - name: "site"
    label: "Site Settings"
    description: "Manage global site settings, WhatsApp number, footer content, and social links"
    icon: "settings"
    files:
      - name: "settings"
        label: "Global Settings"
        file: "src/content/site/settings.md"
        fields:
          - { label: "WhatsApp Number", name: "whatsapp_number", widget: "string", hint: "Include country code, e.g., +255 123 456 789" }
          - label: "Footer"
            name: "footer"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Newsletter Heading", name: "newsletter_heading", widget: "string" }
              - { label: "Newsletter Text", name: "newsletter_text", widget: "text" }
              - { label: "Newsletter Button", name: "newsletter_button", widget: "string" }
              - { label: "CTA Heading", name: "cta_heading", widget: "string" }
              - { label: "CTA Text", name: "cta_text", widget: "text" }
              - { label: "CTA Button", name: "cta_button", widget: "string" }
              - { label: "CTA Button Link", name: "cta_button_link", widget: "string", hint: "Full URL or path, e.g., /contact" }
              - { label: "Copyright", name: "copyright", widget: "string", hint: "e.g., © 2026 Tazama Africa Safaris. All rights reserved." }
              - label: "Social Links"
                name: "social"
                widget: "object"
                hint: "Add full URLs including https://"
                fields:
                  - { label: "TripAdvisor URL", name: "tripadvisor_url", widget: "string", required: false }
                  - { label: "Instagram URL", name: "instagram_url", widget: "string", required: false }
                  - { label: "Facebook URL", name: "facebook_url", widget: "string", required: false }
                  - { label: "YouTube URL", name: "youtube_url", widget: "string", required: false }
                  - { label: "TikTok URL", name: "tiktok_url", widget: "string", required: false }
          - label: "Meta"
            name: "meta"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Site Name", name: "site_name", widget: "string", hint: "Displayed in browser tab and SEO" }
              - { label: "Site URL", name: "site_url", widget: "string", hint: "Base URL without trailing slash, e.g., https://tazamaafricasafaris.com" }

  - name: "homepage"
    label: "Homepage"
    description: "Configure homepage sections — hero, categories, tours, testimonials, and more"
    icon: "home"
    files:
      - name: "homepage"
        label: "Homepage Sections"
        file: "src/content/homepage/homepage.md"
        fields:
          - label: "Sections"
            name: "sections"
            widget: "list"
            collapsed: true
            types:
              - label: "Hero"
                name: "hero"
                fields:
                  - { label: "Visible", name: "visible", widget: "boolean", default: true }
                  - { label: "Heading", name: "heading", widget: "string" }
                  - { label: "Tagline", name: "tagline", widget: "string", required: false }
                  - { label: "Background Video", name: "video_url", widget: "file", required: false, hint: "Upload via Media Library or paste URL" }
                  - { label: "Poster Image", name: "poster_image", widget: "image", required: false, hint: "Shown while video loads or on mobile" }
                  - { label: "Scroll To", name: "scroll_to", widget: "string", required: false, hint: "Section ID to scroll to on button click" }

              - label: "Categories"
                name: "categories"
                fields:
                  - { label: "Visible", name: "visible", widget: "boolean", default: true }
                  - { label: "Heading", name: "heading", widget: "string" }
                  - { label: "Text", name: "text", widget: "text", required: false }
                  - label: "Category Cards"
                    name: "items"
                    widget: "list"
                    collapsed: false
                    summary: "{{fields.title}} — {{fields.subtitle}}"
                    hint: "Add, edit, or reorder the category cards shown on the homepage"
                    fields:
                      - { label: "Title", name: "title", widget: "string", hint: "e.g., Safaris, Trekking" }
                      - { label: "Subtitle", name: "subtitle", widget: "string", hint: "Short description under title" }
                      - { label: "Image", name: "image", widget: "image", hint: "Category card image — 800x1000px recommended" }
                      - { label: "Link", name: "link", widget: "string", hint: "Page URL — e.g., /safaris" }
                      - { label: "Order", name: "order", widget: "number", value_type: "int", hint: "Lower number = appears first" }

              - label: "About"
                name: "about"
                fields:
                  - { label: "Visible", name: "visible", widget: "boolean", default: true }
                  - { label: "Heading", name: "heading", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }
                  - { label: "Image", name: "image", widget: "image", required: false }
                  - label: "Stats"
                    name: "stats"
                    widget: "list"
                    required: false
                    collapsed: true
                    summary: "{{fields.value}} {{fields.label}}"
                    fields:
                      - { label: "Value", name: "value", widget: "string", hint: "e.g., 15+, 500+" }
                      - { label: "Label", name: "label", widget: "string", hint: "e.g., Years Experience, Happy Travelers" }

              - label: "Destinations"
                name: "destinations"
                fields:
                  - { label: "Visible", name: "visible", widget: "boolean", default: true }
                  - { label: "Heading", name: "heading", widget: "string" }
                  - { label: "Text", name: "text", widget: "text", required: false }
                  - { label: "Subtitle", name: "subtitle", widget: "string", required: false }
                  - label: "Destination Cards"
                    name: "items"
                    widget: "list"
                    collapsed: false
                    summary: "{{fields.title}}"
                    hint: "Add, edit, or reorder destination cards shown on the homepage"
                    fields:
                      - { label: "Title", name: "title", widget: "string", hint: "e.g., Tanzania, Kenya" }
                      - { label: "Image", name: "image", widget: "image", hint: "Destination image — 800x600px recommended" }
                      - { label: "Link", name: "link", widget: "string", hint: "Page URL — e.g., /safaris" }
                      - { label: "Order", name: "order", widget: "number", value_type: "int", hint: "Lower number = appears first" }

              - label: "Tours"
                name: "tours"
                fields:
                  - { label: "Visible", name: "visible", widget: "boolean", default: true }
                  - { label: "Heading", name: "heading", widget: "string" }
                  - { label: "Text", name: "text", widget: "text", required: false }

              - label: "Partners"
                name: "partners"
                fields:
                  - { label: "Visible", name: "visible", widget: "boolean", default: true }
                  - { label: "Heading", name: "heading", widget: "string" }
                  - { label: "Text", name: "text", widget: "text", required: false }

              - label: "Lodges"
                name: "lodges"
                fields:
                  - { label: "Visible", name: "visible", widget: "boolean", default: true }
                  - { label: "Heading", name: "heading", widget: "string" }
                  - { label: "Text", name: "text", widget: "text", required: false }
                  - label: "Lodge Cards"
                    name: "items"
                    widget: "list"
                    collapsed: false
                    summary: "{{fields.title}} — {{fields.tag}}"
                    hint: "Add, edit, or reorder lodge cards shown on the homepage"
                    fields:
                      - { label: "Title", name: "title", widget: "string", hint: "e.g., Zuri Zanzibar Hotel & Resort" }
                      - { label: "Image", name: "image", widget: "image", hint: "Lodge image — 800x600px recommended" }
                      - { label: "Rating", name: "rating", widget: "number", value_type: "int", hint: "1 to 5 stars" }
                      - { label: "Tag", name: "tag", widget: "string", hint: "e.g., Luxury, Mid-Range, Budget" }
                      - { label: "Link", name: "link", widget: "string", hint: "Lodge page URL" }
                      - { label: "Order", name: "order", widget: "number", value_type: "int", hint: "Lower number = appears first" }

              - label: "Testimonials"
                name: "testimonials"
                fields:
                  - { label: "Visible", name: "visible", widget: "boolean", default: true }
                  - { label: "Heading", name: "heading", widget: "string" }
                  - { label: "Text", name: "text", widget: "text", required: false }
                  - label: "Testimonial Cards"
                    name: "items"
                    widget: "list"
                    collapsed: false
                    summary: "{{fields.name}} — {{fields.title}}"
                    hint: "Add, edit, or reorder testimonials shown on the homepage"
                    fields:
                      - { label: "Name", name: "name", widget: "string", hint: "Customer name" }
                      - { label: "Avatar", name: "avatar", widget: "image", hint: "Customer photo — square, at least 200x200px" }
                      - { label: "Rating", name: "rating", widget: "number", value_type: "int", hint: "1 to 5 stars" }
                      - { label: "Title", name: "title", widget: "string", hint: "Short review title" }
                      - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
                      - { label: "Travel Type", name: "travel_type", widget: "string", hint: "e.g., Family Safari, Honeymoon, Friends" }
                      - { label: "Text", name: "text", widget: "text", hint: "Full testimonial text" }
                      - { label: "Video URL", name: "video_url", widget: "string", required: false, hint: "YouTube or Vimeo link — optional" }
                      - { label: "Order", name: "order", widget: "number", value_type: "int", hint: "Lower number = appears first" }

              - label: "Contact"
                name: "contact"
                fields:
                  - { label: "Visible", name: "visible", widget: "boolean", default: true }
                  - { label: "Heading", name: "heading", widget: "string" }
                  - { label: "Tagline", name: "tagline", widget: "string", required: false }
                  - { label: "Image", name: "image", widget: "image", required: false }
                  - { label: "Button Text", name: "button_text", widget: "string", required: false }
                  - { label: "Button Link", name: "button_link", widget: "string", required: false }

  - name: "pages"
    label: "Pages"
    description: "Edit content for individual pages — Safaris, Kilimanjaro, Tours, About, Contact, Blogs"
    icon: "description"
    files:
      - name: "safaris"
        label: "Safaris Page"
        file: "src/content/pages/safaris.md"
        fields:
          - { label: "Hero Image", name: "hero_image", widget: "image", hint: "Recommended: 1920x1080px, landscape" }
          - { label: "Hero Tagline", name: "hero_tagline", widget: "string" }
          - { label: "Hero Title", name: "hero_title", widget: "string" }
          - { label: "Hero Description", name: "hero_description", widget: "text" }
          - { label: "Intro Heading", name: "intro_heading", widget: "string" }
          - { label: "Intro Description", name: "intro_description", widget: "text" }
          - { label: "Features Heading", name: "features_heading", widget: "string" }
          - label: "Features"
            name: "features"
            widget: "list"
            collapsed: false
            summary: "{{fields.title}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }

      - name: "kilimanjaro"
        label: "Kilimanjaro Page"
        file: "src/content/pages/kilimanjaro.md"
        fields:
          - { label: "Hero Image", name: "hero_image", widget: "image", hint: "Recommended: 1920x1080px, landscape" }
          - { label: "Hero Tagline", name: "hero_tagline", widget: "string" }
          - { label: "Hero Title", name: "hero_title", widget: "string" }
          - { label: "Hero Description", name: "hero_description", widget: "text" }
          - { label: "Intro Heading", name: "intro_heading", widget: "string" }
          - label: "Intro Text"
            name: "intro_text"
            widget: "list"
            collapsed: false
            summary: "Paragraph {{index}}"
            field: { label: "Paragraph", name: "paragraph", widget: "text" }
          - { label: "Intro Image", name: "intro_image", widget: "image", required: false }
          - { label: "Routes Heading", name: "routes_heading", widget: "string" }
          - label: "Routes"
            name: "routes"
            widget: "list"
            collapsed: false
            summary: "{{fields.name}} — {{fields.days}}"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Days", name: "days", widget: "string", hint: "e.g., 6 Days, 7 Days" }
              - { label: "Difficulty", name: "difficulty", widget: "string", hint: "e.g., Moderate, Challenging, Hard" }
              - { label: "Description", name: "description", widget: "text" }
          - { label: "Treks Heading", name: "treks_heading", widget: "string" }

      - name: "tours"
        label: "Tours Page"
        file: "src/content/pages/tours.md"
        fields:
          - { label: "Hero Tagline", name: "hero_tagline", widget: "string" }
          - { label: "Hero Title", name: "hero_title", widget: "string" }
          - { label: "Hero Description", name: "hero_description", widget: "text" }

      - name: "about"
        label: "About Page"
        file: "src/content/pages/about.md"
        fields:
          - { label: "Hero Image", name: "hero_image", widget: "image", hint: "Recommended: 1920x1080px, landscape" }
          - { label: "Hero Tagline", name: "hero_tagline", widget: "string" }
          - { label: "Hero Title", name: "hero_title", widget: "string" }
          - { label: "Hero Description", name: "hero_description", widget: "text" }
          - { label: "Story Tagline", name: "story_tagline", widget: "string" }
          - { label: "Story Heading", name: "story_heading", widget: "string" }
          - { label: "Story Description", name: "story_description", widget: "text" }
          - label: "Story Extra Paragraphs"
            name: "story_paragraphs"
            widget: "list"
            collapsed: false
            summary: "Paragraph {{index}}"
            field: { label: "Paragraph", name: "paragraph", widget: "text" }
          - { label: "Story Image", name: "story_image", widget: "image" }
          - { label: "Values Heading", name: "values_heading", widget: "string" }
          - { label: "Values Description", name: "values_description", widget: "text" }
          - label: "Values"
            name: "values"
            widget: "list"
            collapsed: false
            summary: "{{fields.title}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Text", name: "text", widget: "text" }
          - label: "Stats"
            name: "stats"
            widget: "list"
            collapsed: false
            summary: "{{fields.value}} {{fields.label}}"
            fields:
              - { label: "Value", name: "value", widget: "string", hint: "e.g., 10+, 5000+" }
              - { label: "Label", name: "label", widget: "string", hint: "e.g., Years Experience, Happy Clients" }
          - { label: "CTA Heading", name: "cta_heading", widget: "string" }
          - { label: "CTA Description", name: "cta_description", widget: "text" }
          - label: "CTA Buttons"
            name: "cta_buttons"
            widget: "list"
            collapsed: false
            summary: "{{fields.text}} → {{fields.link}}"
            fields:
              - { label: "Text", name: "text", widget: "string" }
              - { label: "Link", name: "link", widget: "string" }
              - { label: "Style", name: "style", widget: "select", options: ["primary", "outline"], hint: "Primary = filled button, Outline = bordered button" }

      - name: "contact"
        label: "Contact Page"
        file: "src/content/pages/contact.md"
        fields:
          - { label: "Hero Image", name: "hero_image", widget: "image", hint: "Recommended: 1920x1080px, landscape" }
          - { label: "Hero Tagline", name: "hero_tagline", widget: "string" }
          - { label: "Hero Title", name: "hero_title", widget: "string" }
          - { label: "Hero Description", name: "hero_description", widget: "text" }
          - { label: "Contact Heading", name: "contact_heading", widget: "string" }
          - { label: "Contact Description", name: "contact_description", widget: "text" }
          - label: "Offices"
            name: "offices"
            widget: "list"
            collapsed: false
            summary: "{{fields.title}} — {{fields.email}}"
            fields:
              - { label: "Title", name: "title", widget: "string", hint: "e.g., Tanzania Office, UK Office" }
              - { label: "Email", name: "email", widget: "string", required: false }
              - { label: "Phone", name: "phone", widget: "string", required: false }
              - { label: "Address Line 1", name: "address_line1", widget: "string", required: false }
              - { label: "Address Line 2", name: "address_line2", widget: "string", required: false }
              - { label: "Hours Line 1", name: "hours_line1", widget: "string", required: false }
              - { label: "Hours Line 2", name: "hours_line2", widget: "string", required: false }
          - { label: "Form Heading", name: "form_heading", widget: "string" }
          - { label: "Name Label", name: "form_name_label", widget: "string" }
          - { label: "Email Label", name: "form_email_label", widget: "string" }
          - { label: "Subject Label", name: "form_subject_label", widget: "string" }
          - { label: "Message Label", name: "form_message_label", widget: "string" }
          - { label: "Submit Text", name: "form_submit_text", widget: "string" }
          - { label: "Privacy Text", name: "form_privacy_text", widget: "string" }
          - { label: "CTA Heading", name: "cta_heading", widget: "string" }
          - { label: "CTA Description", name: "cta_description", widget: "text" }
          - label: "CTA Buttons"
            name: "cta_buttons"
            widget: "list"
            collapsed: false
            summary: "{{fields.text}} → {{fields.link}}"
            fields:
              - { label: "Text", name: "text", widget: "string" }
              - { label: "Link", name: "link", widget: "string" }
              - { label: "Style", name: "style", widget: "select", options: ["primary", "outline"] }

      - name: "blogs"
        label: "Blogs Page"
        file: "src/content/pages/blogs.md"
        fields:
          - { label: "Hero Image", name: "hero_image", widget: "image", hint: "Recommended: 1920x1080px, landscape" }
          - { label: "Hero Tagline", name: "hero_tagline", widget: "string" }
          - { label: "Hero Title", name: "hero_title", widget: "string" }
          - { label: "Hero Description", name: "hero_description", widget: "text" }

  - name: "tours"
    label: "Tours"
    description: "Create and manage tour packages — safaris, Kilimanjaro treks, Zanzibar trips"
    icon: "flight"
    folder: "src/content/tours"
    create: true
    slug: "{{slug}}"
    search: true
    sortable_fields: ["order", "title", "price"]
    summary: "{{title}} — {{duration}}"
    fields:
      - { label: "Title", name: "title", widget: "string", hint: "e.g., 7-Day Lemosho Kilimanjaro Trek" }
      - { label: "Image URL", name: "image", widget: "image", hint: "Recommended: 800x600px, landscape" }
      - { label: "Duration", name: "duration", widget: "string", hint: "e.g., 7 days, 5 days / 4 nights" }
      - { label: "Price", name: "price", widget: "string", hint: "Numbers only, no $ or commas — e.g., 2487" }
      - { label: "Badge", name: "badge", widget: "string", required: false, hint: "Tag shown on card — e.g., Kilimanjaro, Best Seller" }
      - { label: "Category", name: "category", widget: "string", hint: "e.g., Kilimanjaro, Safari, Zanzibar" }
      - { label: "Link", name: "link", widget: "string", hint: "URL path — e.g., /tours/7-day-lemosho-kilimanjaro-trek" }
      - { label: "Order", name: "order", widget: "number", value_type: "int", hint: "Lower number = appears first" }
      - { label: "Body", name: "body", widget: "markdown", hint: "Full tour description, itinerary, pricing details" }

  - name: "partners"
    label: "Partners"
    description: "Manage partner logos displayed on the homepage"
    icon: "handshake"
    folder: "src/content/partners"
    create: true
    slug: "{{slug}}"
    search: true
    sortable_fields: ["order", "name"]
    summary: "{{name}}"
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Logo URL", name: "image", widget: "image", hint: "PNG with transparent background preferred" }
      - { label: "Link URL", name: "link", widget: "string", required: false, hint: "Partner website URL — optional" }
      - { label: "Order", name: "order", widget: "number", value_type: "int", hint: "Lower number = appears first" }

  - name: "blog"
    label: "Blog Posts"
    description: "Create and manage blog articles — travel tips, tour highlights, company news"
    icon: "article"
    folder: "src/content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    search: true
    sortable_fields: ["date", "title", "category"]
    summary: "{{title}} — {{date}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Category", name: "category", widget: "string", hint: "e.g., Trekking, Safari, Travel Tips" }
      - { label: "Thumbnail", name: "thumbnail", widget: "image", required: false, hint: "Featured image — recommended 1200x630px for social sharing" }
      - { label: "Author", name: "author", widget: "string", hint: "e.g., Tazama Africa Safaris, John Doe" }
      - { label: "Description", name: "description", widget: "text", required: false, hint: "Short summary for SEO and social sharing" }
      - { label: "Body", name: "body", widget: "markdown", hint: "Full article content — use headings, images, and formatting" }
